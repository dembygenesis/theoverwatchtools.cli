version: "3.7"

services:
  db:
    container_name: "mysql_container"
    networks:
      - default
    restart: always
    image: mysql:8.0
    env_file:
      - db.env
    ports:
      - "${DB_EXPOSED_PORT}:${DB_INTERNAL_PORT}"
    environment:
      MYSQL_TCP_PORT: "${DB_EXPOSED_PORT}"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --sql_mode=""

  # Fuck
  controller:
    # command: /bin/bash -c "CompileDaemon -build='go build -o=/tmp/uplb/controller ./cmd/controller' -command='/tmp/uplb/controller controller' -graceful-kill=true"
    # command: sh /entrypoint.sh
    # command: /bin/bash -c "CompileDaemon -build='go build -o=/tmp/uplb/controller ./cmd/controller' -command='/tmp/uplb/controller controller' -graceful-kill=true"
    # command: wait-for ${MYSQL_ROOT_PASSWORD} && /bin/bash -c "CompileDaemon -build='go build -o=/tmp/uplb/controller ./cmd/controller' -command='/tmp/uplb/controller controller' -graceful-kill=true"
    # command: /bin/bash -c "CompileDaemon -build='go build -o=/tmp/uplb/controller ./cmd/controller' -command='/tmp/uplb/controller controller' -graceful-kill=true"
    # command: /bin/bash -c "CompileDaemon -build='go build -o=/tmp/uplb/controller ./cmd/controller' -command='/tmp/uplb/controller controller' -graceful-kill=true"
    command: sh /entrypoint.sh
    build:
      dockerfile: api.dockerfile
      context: ./docker
      args:
        ENTRYPOINT: "entrypoint.sh"
    networks:
      - default
    env_file:
      - api.env
      - db.env
    working_dir: /
    volumes:
      - ../:/src

networks:
  default:

volumes:
  controller:
  mysql_data: